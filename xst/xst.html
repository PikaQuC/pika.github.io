        function copyResult() {
            const btn = document.getElementById('share-btn');
            const originalText = btn.innerHTML;
            const res = window.currentResult;
            
            const shareText = `【赛博精神科诊断书】\n我被查出竟是：${res.icon}「${res.name}」！\n🚨 临床确诊：${res.diag}\n评价是：${res.action.substring(0, 30)}...\n靠！这什么缺德测试！有种你们也来扒底裤！🤡💦`;
            
            const textarea = document.createElement('textarea');
            textarea.value = shareText;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                btn.innerHTML = `✅ 复制成功！快去群里丢人！`;
                btn.classList.replace('bg-green-500', 'bg-yellow-500');
                btn.classList.replace('border-green-700', 'border-yellow-700');
            } catch (err) {
                alert("复制失败，直接截图去社死吧！");
            }
            
            document.body.removeChild(textarea);
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-yellow-500', 'bg-green-500');
                btn.classList.replace('border-yellow-700', 'border-green-700');
            }, 3000);
        }

        // 初始化
        window.onload = () => {
            renderStart();
        };
    </script>
