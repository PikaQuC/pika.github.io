            const r2 = scores.P > scores.S ? 'P' : 'S';
            const r3 = scores.T > scores.M ? 'T' : 'M';
            const r4 = scores.Sun > scores.Emo ? 'Sun' : 'Emo';
            
            const codeR4 = r4 === 'Sun' ? 'S' : 'E';
            const finalCode = r1 + r2 + r3 + codeR4;
            
            // 现在的 finalCode 绝对能百分之百精准命中 16 种图鉴之一，不会再出现找不到而使用雌小鬼兜底的情况。
            const result = resultTypes[finalCode] || resultTypes["CSTS"];
            
            const html = `
                <div class="max-w-xl w-full pb-10 mt-6">
                    <div class="bg-[#f8fafc] rounded-3xl shadow-2xl overflow-hidden border-4 border-slate-800">
                        
                        <div class="${result.color} p-6 md:p-8 text-center border-b-4 border-slate-800 relative z-10 overflow-hidden">
                            <div class="absolute inset-0 bg-white/10 mix-blend-overlay"></div>
                            
                            <div class="text-6xl md:text-7xl mb-4 shake-crazy bg-white inline-block rounded-full p-2 border-4 border-slate-800 shadow-[4px_4px_0px_#000] relative z-10">${result.icon}</div>
                            
                            <div class="mb-2 relative z-10">
                                <span class="tier-badge tier-${result.tier} text-lg md:text-xl tracking-wider">
                                    稀有度：${result.tier}
                                </span>
                            </div>
                            
                            <div class="mb-3 relative z-10">
                                <span class="bg-black text-yellow-400 font-black px-3 py-1 rounded-sm text-xs md:text-sm border-2 border-white shadow-[2px_2px_0px_rgba(255,255,255,0.5)]">
                                    全网发病概率：${result.prob}
                                </span>
                            </div>
                            
                            <h1 class="text-2xl md:text-4xl font-black ${result.color.includes('text-white') ? 'text-white' : 'text-white'} mt-2 drop-shadow-[2px_2px_0px_#000] tracking-wide relative z-10">${result.name}</h1>
                        </div>
                        
                        <div class="p-5 md:p-8 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxjaXJjbGUgY3g9IjIiIGN5PSIyIiByPSIyIiBmaWxsPSJyZ2JhKDAsMCwwLDAuMDUpIi8+Cjwvc3ZnPg==')] space-y-6 md:space-y-8">
                            
                            <div class="result-section border-red-300 bg-red-50 mt-4 md:mt-0">
                                <span class="result-section-title text-red-600 border-red-300">🚨 临床确诊</span>
                                <p class="text-red-700 font-bold leading-relaxed text-sm md:text-base mt-2">${result.diag}</p>
                            </div>

                            <div class="result-section border-blue-300 bg-blue-50">
                                <span class="result-section-title text-blue-600 border-blue-300">🤡 发病症状</span>
                                <p class="text-slate-700 font-bold leading-relaxed text-sm md:text-base mt-2 text-justify">${result.action}</p>
                            </div>

                            <div class="result-section border-emerald-300 bg-emerald-50">
                                <span class="result-section-title text-emerald-600 border-emerald-300">💊 处方与防身指南</span>
                                <p class="text-emerald-800 font-bold leading-relaxed text-sm md:text-base mt-2 text-justify">${result.advice}</p>
                            </div>
                            
                            <div class="result-section border-slate-300 bg-white">
                                <span class="result-section-title text-slate-800 border-slate-300">📊 变态指数雷达</span>
                                <div class="mt-4">
                                    ${createBar('🐶 沸羊羊舔狗', 'D', 'C', '高冷傲娇 🐱', 'bg-orange-500')}
                                    ${createBar('😇 纯良傻子', 'P', 'S', '满脑废料 🥵', 'bg-pink-500')}
                                    ${createBar('💢 嘴硬欠撅', 'T', 'M', '躺平白给 🧎', 'bg-purple-500')}
                                    ${createBar('⚡ 发癫社牛', 'Sun', 'Emo', '阴暗爬行 🍄', 'bg-blue-500')}
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-3 md:gap-4 mt-6 md:mt-8">
                                <button onclick="copyResult()" id="share-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-3 md:py-4 px-4 md:px-6 rounded-xl transition-transform border-b-4 border-green-700 hover:translate-y-1 active:border-b-0 active:translate-y-2 text-base md:text-lg flex justify-center items-center gap-2 shadow-lg">
                                    📢 炫耀你的 ${result.tier} 级精神病历！
                                </button>
                                <button onclick="startQuiz()" class="w-full bg-white hover:bg-slate-100 text-slate-700 font-black py-3 px-6 rounded-xl transition-colors border-2 border-slate-300 shadow-md text-sm md:text-base">
                                    庸医！我不服！重新鉴定！
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            animateRender(html);
            window.currentResult = result;
        }

        function copyResult() {
            const btn = document.getElementById('share-btn');
            const originalText = btn.innerHTML;
            const res = window.currentResult;
            
            const shareText = `【赛博小兽太成分鉴定】\n我抽到了概率仅 ${res.prob} 的 [${res.tier}级] 精神病！\n确诊为：${res.icon}「${res.name}」\n评价是：${res.action.substring(0, 30)}...\n靠！这什么缺德测试！不服来攀比一下谁更变态！🤡💦`;
            
            const textarea = document.createElement('textarea');
            textarea.value = shareText;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                btn.innerHTML = `✅ 复制成功！快去群里装逼/社死！`;
                btn.classList.replace('bg-green-500', 'bg-yellow-500');
                btn.classList.replace('border-green-700', 'border-yellow-700');
            } catch (err) {
                alert("复制失败，直接截图去社死吧！");
            }
            
            document.body.removeChild(textarea);
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-yellow-500', 'bg-green-500');
                btn.classList.replace('border-yellow-700', 'border-green-700');
            }, 3000);
        }

        window.onload = () => {
            renderStart();
        };
    </script>
</body>
</html>
